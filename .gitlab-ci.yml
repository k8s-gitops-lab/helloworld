include:
  - project: root/ci-templates
    ref: v0.11.1
    file: /gitlab-ci.yml

variables:
  APP_NAME: helloworld
  # Monorepo multi-services (cf. AGENTS.md) : liste "<service>=<image>"
  # espacée, un sous-dossier + un Dockerfile par service. SERVICE_NAME reste
  # le service vitrine pour l'URL des environnements GitLab CI.
  SERVICES: "helloworld-svc=registry.registry.svc.cluster.local:5000/helloworld-svc helloworld-gui=registry.registry.svc.cluster.local:5000/helloworld-gui"
  SERVICE_NAME: helloworld-gui
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181
  MANIFESTS_PROJECT_PATH: root/helloworld-iac
  MANIFESTS_PATH: k8s
  HAS_PREPROD: "true"

build-dev:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  interruptible: true
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - |
      for entry in ${SERVICES}; do
        svc="${entry%%=*}"
        image="${entry#*=}"
        /kaniko/executor \
          --context "${CI_PROJECT_DIR}/${svc}" \
          --dockerfile "${CI_PROJECT_DIR}/${svc}/Dockerfile" \
          --destination "${image}:${CI_COMMIT_SHORT_SHA}" \
          --destination "${image}:dev" \
          --insecure \
          --skip-tls-verify
      done

build-rec:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  interruptible: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - |
      for entry in ${SERVICES}; do
        image="${entry#*=}"
        IMAGE_HOST="${image%%/*}"
        IMAGE_PATH="${image#*/}"
        if /busybox/wget -q --spider "http://${IMAGE_HOST}/v2/${IMAGE_PATH}/manifests/${CI_COMMIT_TAG}"; then
          echo "${image}:${CI_COMMIT_TAG} existe déjà dans le registry." >&2
          exit 1
        fi
      done
    - |
      for entry in ${SERVICES}; do
        svc="${entry%%=*}"
        image="${entry#*=}"
        /kaniko/executor \
          --context "${CI_PROJECT_DIR}/${svc}" \
          --dockerfile "${CI_PROJECT_DIR}/${svc}/Dockerfile" \
          --destination "${image}:${CI_COMMIT_TAG}" \
          --insecure \
          --skip-tls-verify
      done
