include:
  - project: shared-ci/ci-templates
    ref: v1.15.1
    file: /gitlab-ci.yml

variables:
  APP_NAME: helloworld
  # Monorepo multi-services (cf. AGENTS.md) : liste "<service>=<image>"
  # espacée, un sous-dossier + un Dockerfile par service. SERVICE_NAME reste
  # le service vitrine pour l'URL des environnements GitLab CI.
  SERVICES: "helloworld-svc=ghcr.io/k8s-gitops-lab/helloworld-svc helloworld-gui=ghcr.io/k8s-gitops-lab/helloworld-gui"
  SERVICE_NAME: helloworld-gui
  MANIFESTS_PROJECT_PATH: hello-groupe/helloworld-iac
  MANIFESTS_PATH: k8s
  HAS_PREPROD: "true"
