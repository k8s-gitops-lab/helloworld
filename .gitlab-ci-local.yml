# Surcharges pour gitlab-ci-local (https://github.com/firecow/gitlab-ci-local).
# Ce fichier est commitable — il utilise des variables locales non secrètes.
# Les secrets vont dans .gitlab-ci-local-secrets.yml (gitignore).
#
# Prérequis : ci-templates doit être un dossier voisin :
#   ../ci-templates/

variables:
  CI_SCRIPTS_DIR: /ci-scripts
  # En local, GitLab est accessible via l'adresse externe (pas l'URL in-cluster).
  INTERNAL_GITLAB_HOST: gitlab.192.168.33.100.nip.io
  DOMAIN: 192.168.33.100.nip.io
  # SHA court par défaut pour les jobs deploy-dev en local.
  CI_COMMIT_SHORT_SHA: local
